# ============================================================================
#  Omni-Endo AI: one stack, three ways to use your diabetes data
# ============================================================================
#  First time:   docker compose up -d --build
#  Afterwards:   docker compose up -d
#  Stop:         docker compose down
#  View logs:    docker compose logs -f omni-endo
#
#  Once running you have THREE things, all from this one stack:
#    1. A data server Claude can connect to        (see README: "Use with Claude")
#    2. A live API explorer at  http://localhost:8000/docs
#    3. A chat UI at            http://localhost:8083  (Ollama can use your data)
#
#  You only edit ONE file: .env  (your Glooko login and one secret token).
# ============================================================================

services:
  # ---- The data server ------------------------------------------------------
  # Built from the code in this folder the first time you run --build, then run
  # as a network (HTTP/SSE) server so the bridge, Open WebUI, and optionally
  # Claude can all reach it.
  omni-endo:
    build: .
    image: omni-endo-ai-mcp:latest
    container_name: omni-endo-mcp
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      OMNI_TRANSPORT: http             # network server, not stdio
      OMNI_HTTP_HOST: 0.0.0.0          # reachable by the other containers
      OMNI_HTTP_PORT: "3033"
      OMNI_HTTP_PATH: /mcp
      OMNI_HTTP_TOKEN: ${OMNI_TOKEN}   # the secret from .env (single source)
    volumes:
      - ./data:/data                   # your downloaded history persists here
    ports:
      - "3033:3033"

  # ---- The bridge / API -----------------------------------------------------
  # Turns the MCP server into a plain REST API with a Swagger explorer, and is
  # what Open WebUI (Ollama) talks to. All settings are passed on the command
  # line; the token comes from .env, so it lives in exactly one place.
  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo
    restart: unless-stopped
    ports:
      - "8000:8000"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--api-key"
      - "${OMNI_TOKEN}"
      - "--server-type"
      - "streamable-http"
      - "--header"
      - '{"Authorization": "Bearer ${OMNI_TOKEN}"}'
      - "--"
      - "http://omni-endo:3033/mcp"
    depends_on:
      - omni-endo

  # ---- Chat UI (optional) ---------------------------------------------------
  # For chatting with a local Ollama model that can call your data tools.
  # If you do not use Ollama, you can delete this whole service and the volume.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8083:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mcpo

volumes:
  open-webui:
